{% extends "base.html" %}

{% block content %}
<div class="dashboard-grid">
    <!-- Model Configuration Panel -->
    <div class="col-4 glass-panel">
        <div class="panel-header">
            <h2 class="panel-title"><i class="fa-solid fa-gears"></i> Engine Configurations</h2>
        </div>
        <div class="panel-body">
            <form id="train-config-form" style="display:flex; flex-direction:column; gap:16px;">
                <div class="form-group">
                    <label for="ml-algorithm">ML Algorithm</label>
                    <select id="ml-algorithm" class="form-control">
                        <option value="random_forest">Random Forest Regressor</option>
                        <option value="xgboost">XGBoost Regressor (Fallback)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="train-period">Training Historical Data</label>
                    <select id="train-period" class="form-control">
                        <option value="3mo">Last 3 Months (Recommended)</option>
                        <option value="1y">Last 1 Year</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="forecast-window">Forecast Window</label>
                    <input type="number" id="forecast-window" class="form-control" value="7" readonly>
                    <small style="color:var(--text-muted); font-size:11px;">Fixed 7-day projection horizon.</small>
                </div>
                <button type="submit" class="submit-alert-btn" style="background:var(--accent-blue-glow); color:var(--accent-blue); border:1px solid rgba(59,130,246,0.3);">
                    Retrain Model
                </button>
            </form>
            
            <div style="margin-top:24px; padding-top:16px; border-top:1px solid var(--panel-border);">
                <h4 class="section-title">FEATURE IMPORTANCE</h4>
                <ul id="feature-importance-list" style="list-style-type:none; padding:0;">
                    <!-- Populated dynamically by JS -->
                </ul>
            </div>
        </div>
    </div>

    <!-- Prediction Chart Panel -->
    <div class="col-8 glass-panel">
        <div class="panel-header">
            <h2 class="panel-title"><i class="fa-solid fa-chart-line"></i> 7-Day ML Price Projection</h2>
            <div style="display:flex; gap:10px;">
                <div class="badge sentiment-pos" style="font-size:10px;">
                    MAE: <span id="model-mae">$0.00</span>
                </div>
                <div class="badge sentiment-pos" style="font-size:10px;">
                    Accuracy: <span id="model-accuracy">...</span>
                </div>
            </div>
        </div>
        <div class="panel-body">
            <div class="chart-container" id="prediction-chart-canvas">
                <!-- Loaded dynamically by JS -->
            </div>
        </div>
    </div>
</div>

<script>
    // Bind Retrain action
    document.getElementById("train-config-form").onsubmit = function(e) {
        e.preventDefault();
        loadPredictionsPage(true); // Retrain and redraw
    };
</script>
{% endblock %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - MarketPulse AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .auth-container {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: linear-gradient(135deg, #0a0f1d 0%, #070a13 100%);
        }
        .auth-card {
            width: 100%;
            max-width: 400px;
            padding: 40px;
            border-radius: 16px;
            text-align: center;
        }
        .auth-brand {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
        }
        .auth-brand h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 24px;
            font-weight: 800;
        }
        .auth-subtitle {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 24px;
        }
        .error-message {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #ef4444;
            font-size: 13px;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 16px;
            text-align: left;
        }
        .auth-form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        .auth-form-group label {
            display: block;
            font-size: 11px;
            font-weight: 700;
            color: var(--text-secondary);
            margin-bottom: 8px;
            text-transform: uppercase;
        }
        .auth-form-control {
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--panel-border);
            border-radius: 8px;
            padding: 12px 16px;
            color: var(--text-primary);
            outline: none;
            font-size: 14px;
            transition: all 0.2s ease;
        }
        .auth-form-control:focus {
            border-color: var(--accent-blue);
            box-shadow: 0 0 8px var(--accent-blue-glow);
        }
        .auth-btn {
            width: 100%;
            background: var(--accent-blue);
            color: white;
            padding: 12px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            font-size: 14px;
            transition: background 0.2s ease;
            margin-top: 10px;
        }
        .auth-btn:hover {
            background: #2563eb;
        }
        .auth-link {
            display: block;
            margin-top: 24px;
            font-size: 13px;
            color: var(--text-secondary);
            text-decoration: none;
            transition: color 0.2s ease;
        }
        .auth-link:hover {
            color: var(--accent-blue);
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card glass-panel">
            <div class="auth-brand">
                <img src="{{ url_for('static', filename='images/logo.png') }}" alt="MarketPulse AI Logo" style="width: 38px; height: 38px; border-radius: 50%; border: 1px solid var(--accent-blue-glow); box-shadow: 0 0 8px var(--accent-blue-glow);">
                <h1 style="margin-left: 10px;">MarketPulse <span class="accent-text">AI</span></h1>
            </div>
            <p class="auth-subtitle">Register a new terminal user account</p>
            
            {% if error %}
                <div class="error-message">
                    <i class="fa-solid fa-triangle-exclamation"></i> {{ error }}
                </div>
            {% endif %}

            <form action="{{ url_for('route_register') }}" method="POST">
                <div class="auth-form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" required placeholder="e.g. trader_john" class="auth-form-control" autocomplete="username">
                </div>
                <div class="auth-form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" required placeholder="e.g. user@marketpulse.ai" class="auth-form-control" autocomplete="email">
                </div>
                <div class="auth-form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required placeholder="••••••••" class="auth-form-control" autocomplete="new-password">
                    <div style="display:flex; align-items:center; gap:8px; margin-top:8px; font-size:12px; color:var(--text-secondary);">
                        <input type="checkbox" id="show-password" style="cursor:pointer;">
                        <label for="show-password" style="margin-bottom:0; font-weight:normal; text-transform:none; cursor:pointer; user-select:none;">Show Password</label>
                    </div>
                </div>
                <button type="submit" class="auth-btn">Sign Up</button>
            </form>

            <a href="{{ url_for('route_login') }}" class="auth-link">Already have an account? Sign In</a>
        </div>
    </div>

    <script>
        const pwInput = document.getElementById("password");
        const showPwCheckbox = document.getElementById("show-password");
        if (showPwCheckbox && pwInput) {
            showPwCheckbox.addEventListener("change", function() {
                pwInput.type = this.checked ? "text" : "password";
            });
        }
    </script>
</body>
</html>
